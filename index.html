<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silverbird Cinemas – My Tickets</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1b2638;
      --navy2:  #1f2d42;
      --light:  #f4f4f0;
      --muted:  #8a9bb0;
      --white:  #ffffff;
      --accent: #d4af6a;
      --tag-bg: #eceae4;
    }

    body {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
    }

    /* header */
    .app-header {
      text-align: center;
      padding: 16px 0 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .brand-icon {
      width: 30px; height: 30px;
      background: var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 18px; height: 18px; }
    .brand-text { text-align: left; line-height: 1.1; }
    .brand-text .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      color: var(--white);
      letter-spacing: 2px;
    }
    .brand-text .sub {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--white);
      letter-spacing: 4px;
      margin-top: 14px;
    }

    /* ── Ticket card ── */
    .ticket-wrap {
      padding: 0 20px;
    }

    .ticket {
      background: var(--white);
      border-radius: 18px;
      overflow: visible;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }

    .ticket-body {
      padding: 24px 24px 20px;
    }

    .movie-title {
      font-size: 13px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .movie-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      color: #0f1a2a;
      letter-spacing: 3px;
      line-height: 1;
      margin-bottom: 20px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 0;
      margin-bottom: 16px;
    }
    .meta-item .label {
      font-size: 10px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 2px;
    }
    .meta-item .value {
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    .theater-row {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1.5px dashed #ddd;
    }
    .theater-row .label {
      font-size: 10px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 2px;
    }
    .theater-row .value {
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    .ticket-meta-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 20px;
    }
    .ticket-meta-row .label {
      font-size: 10px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .ticket-meta-row .value {
      font-size: 13px;
      font-weight: 700;
      color: #111;
    }

    /* QR section */
    .qr-section {
      text-align: center;
      padding: 16px 0 20px;
    }
    .qr-label {
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .qr-code {
      width: 120px;
      height: 120px;
      margin: 0 auto;
    }
    .qr-code svg {
      width: 100%;
      height: 100%;
    }

    /* tear line */
    .tear-line {
      position: relative;
      height: 0;
      border-top: 2px dashed #ccc;
      margin: 0 -10px;
    }
    .tear-line::before,
    .tear-line::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      background: var(--navy2);
      border-radius: 50%;
    }
    .tear-line::before { left: -10px; }
    .tear-line::after  { right: -10px; }

    /* price stub */
    .price-stub {
      background: var(--tag-bg);
      border-radius: 0 0 18px 18px;
      padding: 20px 24px;
      text-align: center;
    }
    .price-label {
      font-size: 11px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .price-amount {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: #111;
      letter-spacing: 2px;
    }

    .container {
      width: 375px;
    }
  </style>
</head>
